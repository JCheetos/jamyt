<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JamYT Receiver</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Cast Application Framework: provee window.cast.framework.*.
       ⚠️ URL CRÍTICA — la documentación vieja (//www.gstatic.com/cast/receiver/caf_receiver.js)
       devuelve 404 desde 2024 y hace que `cast` quede undefined, dándonos
       el síntoma "TV en negro 60s + error 2473". URL nueva tomada de
       https://developers.google.com/cast/docs/caf_receiver/basic (sección
       "Google Web Receiver SDK"). -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
  <!-- Contenedor donde el YouTube IFrame Player se inyecta en runtime -->
  <div id="player"></div>

  <!-- Overlay de diagnóstico en pantalla:
       visible si el receiver falla, auto-oculto tras boot exitoso. -->
  <div id="jamyt-status">
    <div class="jamyt-status-header" id="jamyt-status-header">[JamYT] Receiver inicializando…</div>
    <div class="jamyt-status-detail" id="jamyt-status-detail"></div>
    <div class="jamyt-status-hint" id="jamyt-status-hint"></div>
  </div>

  <script src="player.js"></script>
</body>
</html>
