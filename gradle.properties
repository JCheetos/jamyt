# Project-wide Gradle properties.
# Estas propiedades aplican a todos los subproyectos del build.

# --- AndroidX ---
# Obligatorio: el proyecto usa librerías AndroidX (Compose, Room, Lifecycle, Activity, etc.).
# Sin esto el build falla con: "android.useAndroidX property is not enabled".
android.useAndroidX=true

# Genera una clase R por módulo en lugar de una global. Acelera builds incrementales.
android.nonTransitiveRClass=true

# --- Kotlin ---
kotlin.code.style=official

# --- Gradle JVM ---
# 2 GB es suficiente para proyectos pequeños-medianos. Sube si experimentas OOM.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# --- Build performance ---
# Habilita caché de configuración y ejecución entre builds.
org.gradle.caching=true
# Hasta 2构建 paralelos reduce tiempo de builds multi-módulo (no afecta aquí, pero no estorba).
org.gradle.parallel=true
